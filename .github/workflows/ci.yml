name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Build with Maven (in QueryBasedApp folder)
      - name: Build with Maven
        run: mvn clean install
        working-directory: QueryBasedApp

      # 4️⃣ Upload the JAR as an artifact
      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: dynamic-query-jar
          path: QueryBasedApp/target/dynamic-query-1.0.0.jar